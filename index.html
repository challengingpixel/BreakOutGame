<!doctype html>
<html lang="en-US">
  <head>
    <meta charset="utf-8" />
    <meta name="robots" content="noindex">
    <title>Gamedev Canvas Workshop</title>
    <style>
      * {
        padding: 0;
        margin: 0;
      }
      canvas {
        background: #eeeeee;
        display: block;
        margin: 0 auto;
      }
    </style>
  </head>
  <body>
    <canvas id="myCanvas" width="480" height="320"></canvas>
    <button id="runButton">Start game</button>

    <!-- Vite handles all TypeScript compilation and module loading.
         The entire game is wired through this single entry point. -->
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
